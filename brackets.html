<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brackets | MDG</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<main class="container section">
  <h1>🏟️ Brackets</h1>
  <p class="muted">MDG Season 2 tournament bracket.</p>

  <section class="bracket">

    <div class="round">
      <h2>Quarterfinals</h2>
      <div class="match"><span>Team 1</span><span>vs</span><span>Team 8</span></div>
      <div class="match"><span>Team 4</span><span>vs</span><span>Team 5</span></div>
      <div class="match"><span>Team 2</span><span>vs</span><span>Team 7</span></div>
      <div class="match"><span>Team 3</span><span>vs</span><span>Team 6</span></div>
    </div>

    <div class="round">
      <h2>Semifinals</h2>
      <div class="match"><span>Winner QF1</span><span>vs</span><span>Winner QF2</span></div>
      <div class="match"><span>Winner QF3</span><span>vs</span><span>Winner QF4</span></div>
    </div>

    <div class="round">
      <h2>Final</h2>
      <div class="match final"><span>Winner SF1</span><span>vs</span><span>Winner SF2</span></div>
    </div>

    <div class="round">
      <h2>Champion</h2>
      <div class="match champion"><span>🏆 Champion</span></div>
    </div>

  </section>
</main>

<footer>
  <div class="container">© 2026 MDG: Mythic Dungeon Greece</div>
</footer>

<script src="assets/app.js"></script>
<script>boot();</script>

</body>
</html>
