<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brackets | MDG</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<main class="container section">
  <h1>⚔️ Tournament Bracket</h1>
  <p class="muted">Eight teams enter the dungeon. One team becomes legend.</p>

  <section class="tournament-bracket">

    <div class="bracket-round">
      <h2>Quarterfinals</h2>

      <div class="bracket-match">
        <div class="team">Team 1</div>
        <div class="team">Team 8</div>
      </div>

      <div class="bracket-match">
        <div class="team">Team 4</div>
        <div class="team">Team 5</div>
      </div>

      <div class="bracket-match">
        <div class="team">Team 2</div>
        <div class="team">Team 7</div>
      </div>

      <div class="bracket-match">
        <div class="team">Team 3</div>
        <div class="team">Team 6</div>
      </div>
    </div>

    <div class="bracket-round semi-round">
      <h2>Semifinals</h2>

      <div class="bracket-match">
        <div class="team">Winner QF1</div>
        <div class="team">Winner QF2</div>
      </div>

      <div class="bracket-match">
        <div class="team">Winner QF3</div>
        <div class="team">Winner QF4</div>
      </div>
    </div>

    <div class="bracket-round final-round">
      <h2>Final</h2>

      <div class="bracket-match final-match">
        <div class="team">Winner SF1</div>
        <div class="team">Winner SF2</div>
      </div>
    </div>

    <div class="bracket-round champion-round">
      <h2>Champion</h2>

      <div class="champion-box">
        🏆 Champion
      </div>
    </div>

  </section>
</main>

<footer>
  <div class="container">© 2026 MDG: Mythic Dungeon Greece</div>
</footer>

<script src="assets/app.js"></script>
<script>boot();</script>

</body>
</html>
